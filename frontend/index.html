<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FundPilot</title>
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    /* ── Reset & base ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:           #0d1117;
      --surface:      #161b22;
      --surface2:     #21262d;
      --surface3:     #2d333b;
      --border:       #30363d;
      --accent:       #388bfd;
      --accent-dk:    #1f6feb;
      --success:      #3fb950;
      --warning:      #d29922;
      --danger:       #f85149;
      --info:         #58a6ff;
      --text:         #e6edf3;
      --text-dim:     #8b949e;
      --text-heading: #c9d1d9;
      --up:           #3fb950;
      --down:         #f85149;
      --flat:         #8b949e;
      --radius:       6px;
      --font-mono:    "Cascadia Code", "Fira Code", "Consolas", monospace;
      --font-ui:      "Segoe UI", system-ui, -apple-system, sans-serif;
    }
    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: var(--font-ui); font-size: 14px; overflow: hidden;
    }

    /* ── Scrollbar ──────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface2); }
    ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border); }

    /* ── Layout ─────────────────────────────────────────────────────── */
    #app { display: flex; flex-direction: column; height: 100vh; }

    /* Header */
    #header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; height: 52px; min-height: 52px;
      background: #010409; border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #brand { display: flex; align-items: baseline; gap: 10px; }
    #brand-name { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: -0.3px; }
    #brand-sub  { font-size: 11px; color: var(--text-dim); }
    #header-right { display: flex; align-items: center; gap: 14px; }
    #monitor-badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text-dim);
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-dim); flex-shrink: 0;
      transition: background 0.3s;
    }
    .dot.running  { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .dot.stopped  { background: var(--warning); }
    .dot.error    { background: var(--danger); }

    /* Grid */
    #grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 3fr 2fr;
      gap: 8px; padding: 8px; flex: 1; overflow: hidden;
      min-height: 0;
    }

    /* Panel */
    .panel {
      display: flex; flex-direction: column;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; min-height: 0;
    }
    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 14px; background: var(--surface2);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .panel-title { font-size: 12px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
    .panel-meta  { font-size: 11px; color: var(--text-dim); display: flex; align-items: center; gap: 6px; }
    .panel-body  { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }

    /* Status dot inside panel */
    .ai-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); transition: background 0.3s; }
    .ai-dot.busy    { background: var(--warning); box-shadow: 0 0 5px var(--warning); }
    .ai-dot.done    { background: var(--success); }
    .ai-dot.error   { background: var(--danger); }

    /* ── AI Output ──────────────────────────────────────────────────── */
    #ai-output {
      flex: 1; padding: 14px 16px; overflow-y: auto;
      font-size: 14px; line-height: 1.7; color: var(--text);
      white-space: pre-wrap; word-break: break-word;
      font-family: var(--font-ui); min-height: 0;
    }

    /* ── Control panel ──────────────────────────────────────────────── */
    #ctrl-panel .panel-body { padding: 12px 14px; gap: 10px; overflow-y: auto; }

    .info-row {
      display: grid; grid-template-columns: auto 1fr auto 1fr;
      gap: 4px 12px; align-items: center; padding: 8px 10px;
      background: var(--surface2); border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .info-key   { font-size: 11px; color: var(--text-dim); white-space: nowrap; }
    .info-val   { font-size: 12px; color: var(--text); font-family: var(--font-mono); }

    .section-sep { height: 1px; background: var(--border); margin: 2px 0; flex-shrink: 0; }

    #question-label { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
    #question-input {
      width: 100%; min-height: 80px; max-height: 140px;
      padding: 10px 12px; resize: vertical;
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border); border-radius: var(--radius);
      font: 14px var(--font-ui); line-height: 1.5; outline: none;
      transition: border-color 0.2s;
    }
    #question-input:focus  { border-color: var(--accent); }
    #question-input::placeholder { color: var(--text-dim); }

    .btn-row { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-row > * { flex: 1; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 7px 12px; border: none; border-radius: var(--radius);
      font: 13px var(--font-ui); font-weight: 500; cursor: pointer;
      transition: opacity 0.15s, filter 0.15s; white-space: nowrap;
      outline: none;
    }
    .btn:hover:not(:disabled) { filter: brightness(1.15); }
    .btn:active:not(:disabled) { filter: brightness(0.9); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-accent   { background: var(--accent-dk); color: #fff; }
    .btn-primary  { background: #1f4f8a; color: #fff; }
    .btn-success  { background: #1a5c2e; color: var(--success); border: 1px solid #2ea043; }
    .btn-danger   { background: #5c1a1a; color: var(--danger);  border: 1px solid var(--danger); }
    .btn-neutral  { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); }
    .btn-neutral:hover:not(:disabled) { color: var(--text); border-color: var(--accent); filter: none; }

    /* ── Chart panel ────────────────────────────────────────────────── */
    #chart-panel .panel-header { gap: 8px; }
    #chart-ticker-label {
      font-size: 13px; font-weight: 700; color: var(--text-heading);
      font-family: var(--font-mono); min-width: 60px;
    }
    #chart-period-btns { display: flex; gap: 4px; }
    .btn-period {
      padding: 3px 8px; font-size: 11px; font-weight: 600;
      background: var(--surface3); color: var(--text-dim);
      border: 1px solid var(--border); border-radius: 4px; cursor: pointer;
      transition: all 0.15s;
    }
    .btn-period:hover  { border-color: var(--accent); color: var(--text); }
    .btn-period.active { background: var(--accent-dk); color: #fff; border-color: var(--accent-dk); }

    #chart-container {
      flex: 1; width: 100%; min-height: 0;
      position: relative;
    }
    #chart-placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; color: var(--text-dim); pointer-events: none;
    }
    #chart-placeholder .ph-icon { font-size: 32px; }
    #chart-placeholder .ph-text { font-size: 12px; }
    #chart-loading {
      display: none; position: absolute; inset: 0;
      align-items: center; justify-content: center;
      background: rgba(13,17,23,.7); z-index: 5;
    }
    #chart-loading.active { display: flex; }

    /* ── Data table ─────────────────────────────────────────────────── */
    #table-wrap { flex: 1; overflow: auto; min-height: 0; }
    #data-table {
      width: 100%; border-collapse: collapse; font-size: 13px;
      font-family: var(--font-mono);
    }
    #data-table th {
      position: sticky; top: 0; z-index: 1;
      padding: 8px 12px; text-align: right;
      background: var(--surface2); color: var(--text-dim);
      font: 600 11px var(--font-ui); text-transform: uppercase;
      letter-spacing: 0.4px; border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    #data-table th:first-child { text-align: center; }
    #data-table td {
      padding: 8px 12px; text-align: right;
      border-bottom: 1px solid rgba(48,54,61,.5);
      transition: background 0.15s;
    }
    #data-table td:first-child { text-align: center; font-weight: 600; color: var(--text-heading); }
    #data-table tr { cursor: pointer; }
    #data-table tr:hover td { filter: brightness(1.15); }
    #data-table tr.selected td { outline: 1px solid rgba(56,139,253,.4); }

    /* Row alert highlights */
    #data-table tr.row-critical td { background: rgba(248,81,73,.13); }
    #data-table tr.row-warning  td { background: rgba(210,153,34,.11); }
    #data-table tr.row-info     td { background: rgba(88,166,255,.08); }
    #data-table tr.row-up       td { background: rgba(63,185,80,.10); }

    .up   { color: var(--up); }
    .down { color: var(--down); }
    .flat { color: var(--flat); }

    .change-chip {
      display: inline-block; padding: 1px 6px; border-radius: 3px;
      font-size: 12px; font-weight: 600;
    }
    .change-chip.up   { background: rgba(63,185,80,.18); }
    .change-chip.down { background: rgba(248,81,73,.18); }
    .change-chip.flat { background: rgba(139,148,158,.1); }

    /* Alert dot on ticker cell */
    .alert-dot {
      display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; margin-left: 5px; vertical-align: middle;
    }
    .alert-dot.critical { background: var(--danger); box-shadow: 0 0 4px var(--danger); }
    .alert-dot.warning  { background: var(--warning); }
    .alert-dot.info     { background: var(--info); }
    .alert-dot.up       { background: var(--success); }

    /* ── Status bar ─────────────────────────────────────────────────── */
    #statusbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; height: 24px; min-height: 24px;
      background: #010409; border-top: 1px solid var(--border);
      font-size: 11px; color: var(--text-dim); flex-shrink: 0;
    }

    /* ── Lang toggle ───────────────────────────────────────────────── */
    #lang-btn {
      padding: 4px 10px; font-size: 12px; font-weight: 600;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 4px; color: var(--text-dim); cursor: pointer;
    }
    #lang-btn:hover { border-color: var(--accent); color: var(--text); }

    /* ── Spinner ───────────────────────────────────────────────────── */
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ────────────────────────────────────────────────── */
    @media (max-width: 900px) {
      #grid { grid-template-columns: 1fr; grid-template-rows: repeat(4, minmax(200px, 1fr)); }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ── Header ─────────────────────────────────────────────────────── -->
  <header id="header">
    <div id="brand">
      <span id="brand-name">FundPilot</span>
      <span id="brand-sub" data-i18n="brand_sub">AI 基金监控</span>
    </div>
    <div id="header-right">
      <div id="monitor-badge">
        <div class="dot" id="monitor-dot"></div>
        <span id="monitor-status-text" data-i18n="monitor_not_started">未启动</span>
      </div>
      <button id="lang-btn">EN</button>
    </div>
  </header>

  <!-- ── Grid ───────────────────────────────────────────────────────── -->
  <div id="grid">

    <!-- Left-top: AI output -->
    <div class="panel" id="ai-panel">
      <div class="panel-header">
        <span class="panel-title" data-i18n="frame_ai">AI 分析</span>
        <div class="panel-meta">
          <div class="ai-dot" id="ai-dot"></div>
          <span id="ai-status" data-i18n="ai_status_ready">就绪</span>
        </div>
      </div>
      <div class="panel-body">
        <div id="ai-output" data-i18n-placeholder="ai_initial">FundPilot 已就绪。

这里会显示主动问答结果，或手动巡检分析。</div>
      </div>
    </div>

    <!-- Right-top: Control -->
    <div class="panel" id="ctrl-panel">
      <div class="panel-header">
        <span class="panel-title" data-i18n="frame_control">提问 / 控制</span>
      </div>
      <div class="panel-body" style="padding:12px 14px; gap:10px; overflow-y:auto; display:flex; flex-direction:column;">

        <!-- Status info -->
        <div class="info-row">
          <span class="info-key" data-i18n="monitor_label">监控</span>
          <span class="info-val" id="monitor-status-ctrl" data-i18n="monitor_not_started">未启动</span>
          <span class="info-key" data-i18n="refresh_label">刷新</span>
          <span class="info-val" id="refresh-time">--</span>
        </div>

        <div class="section-sep"></div>

        <!-- Question input -->
        <div>
          <div id="question-label" data-i18n="question_label">向 AI 提问</div>
          <textarea id="question-input" rows="4"
            placeholder="今天这组ETF有没有明显风格分化？（Ctrl+Enter 发送）"
            data-i18n-placeholder="question_placeholder"
          ></textarea>
        </div>

        <!-- Row 1: primary actions -->
        <div class="btn-row">
          <button class="btn btn-accent"  id="btn-ask"     data-i18n="btn_ask">提问</button>
          <button class="btn btn-primary" id="btn-inspect" data-i18n="btn_inspect">巡检</button>
          <button class="btn btn-neutral" id="btn-refresh" data-i18n="btn_refresh">刷新</button>
        </div>

        <!-- Row 2: monitor + quick questions -->
        <div class="btn-row">
          <button class="btn btn-success" id="btn-start"  data-i18n="btn_start">启动监控</button>
          <button class="btn btn-danger"  id="btn-stop"   data-i18n="btn_stop">停止</button>
          <button class="btn btn-neutral" id="btn-q1"     data-i18n="btn_q1">谁最值得盯</button>
          <button class="btn btn-neutral" id="btn-q2"     data-i18n="btn_q2">差异对比</button>
        </div>

        <!-- Row 3: recommend -->
        <div class="btn-row">
          <button class="btn btn-primary" id="btn-recommend" data-i18n="btn_recommend">智能评分</button>
        </div>

      </div>
    </div>

    <!-- Left-bottom: Interactive K-line chart -->
    <div class="panel" id="chart-panel">
      <div class="panel-header">
        <div class="panel-meta" style="gap:10px">
          <span class="panel-title" data-i18n="frame_chart">K 线图</span>
          <span id="chart-ticker-label">--</span>
        </div>
        <div id="chart-period-btns">
          <button class="btn-period" data-period="1mo">1M</button>
          <button class="btn-period active" data-period="3mo">3M</button>
          <button class="btn-period" data-period="6mo">6M</button>
          <button class="btn-period" data-period="1y">1Y</button>
          <button class="btn-period" data-period="2y">2Y</button>
        </div>
      </div>
      <div class="panel-body" style="position:relative;">
        <div id="chart-container">
          <div id="chart-placeholder">
            <div class="ph-icon">📈</div>
            <div class="ph-text" data-i18n="chart_hint">点击右侧表格中任意一行加载 K 线图</div>
          </div>
          <div id="chart-loading"><div class="spinner"></div></div>
        </div>
      </div>
    </div>

    <!-- Right-bottom: Live data -->
    <div class="panel" id="data-panel">
      <div class="panel-header">
        <span class="panel-title" data-i18n="frame_data">实时数据</span>
        <span class="panel-meta" id="snapshot-meta" data-i18n="snapshot_none">暂无快照</span>
      </div>
      <div class="panel-body">
        <div id="table-wrap">
          <table id="data-table">
            <thead>
              <tr>
                <th data-i18n="col_ticker">代码</th>
                <th data-i18n="col_latest">最新价</th>
                <th data-i18n="col_prev">前收盘</th>
                <th data-i18n="col_change">涨跌幅</th>
                <th data-i18n="col_time">时间</th>
              </tr>
            </thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
      </div>
    </div>

  </div>

  <!-- ── Status bar ──────────────────────────────────────────────────── -->
  <div id="statusbar">
    <span id="status-msg" data-i18n="statusbar_ready">就绪</span>
    <span id="clock"></span>
  </div>

</div><!-- #app -->

<script>
/* ── i18n ─────────────────────────────────────────────────────────────── */
const STRINGS = {
  zh: {
    brand_sub: "AI 基金监控",
    frame_ai: "AI 分析", frame_control: "提问 / 控制",
    frame_chart: "K 线图", frame_data: "实时数据",
    ai_status_ready: "就绪",
    ai_initial: "FundPilot 已就绪。\n\n这里会显示主动问答结果，或手动巡检分析。",
    monitor_label: "监控", refresh_label: "刷新",
    monitor_not_started: "未启动", monitor_running: "运行中  PID {pid}",
    monitor_stopped: "已停止", monitor_not_running: "未运行",
    monitor_exited: "已退出",
    question_label: "向 AI 提问",
    question_placeholder: "今天这组ETF有没有明显风格分化？（Ctrl+Enter 发送）",
    btn_ask: "提问", btn_inspect: "巡检", btn_refresh: "刷新",
    btn_start: "启动监控", btn_stop: "停止",
    btn_q1: "谁最值得盯", btn_q2: "差异对比",
    btn_recommend: "智能评分",
    snapshot_none: "暂无快照",
    snapshot_label: "快照：{t}",
    col_ticker: "代码", col_latest: "最新价", col_prev: "前收盘",
    col_change: "涨跌幅", col_time: "时间",
    chart_hint: "点击右侧表格中任意一行加载 K 线图",
    chart_loading: "加载中…",
    chart_done: "图表已加载", chart_fail: "图表加载失败",
    asking: "正在调用 AI，请稍候…",
    ask_done: "问答完成", ask_fail: "问答失败",
    inspecting: "正在巡检，请稍候…",
    inspect_done: "巡检完成", inspect_fail: "巡检失败",
    recommending: "正在生成评分，请稍候…",
    recommend_done: "评分完成", recommend_fail: "评分失败",
    monitor_already: "监控进程已在运行",
    start_ok: "监控已启动", stop_ok: "监控已停止",
    q1_text: "现在谁最值得重点盯？",
    q2_text: "VUAG 和 CSP1 当前差异主要在哪？",
    statusbar_ready: "就绪",
    lang_btn: "EN",
    ratings_header: "── 评分排行 ──────────────────────────────",
    ratings_score: "分", ratings_daily: "日",
  },
  en: {
    brand_sub: "AI Fund Monitor",
    frame_ai: "AI Analysis", frame_control: "Ask / Control",
    frame_chart: "K-Line Chart", frame_data: "Live Data",
    ai_status_ready: "Ready",
    ai_initial: "FundPilot is ready.\n\nAI responses and inspection results will appear here.",
    monitor_label: "Monitor", refresh_label: "Refreshed",
    monitor_not_started: "Not started", monitor_running: "Running  PID {pid}",
    monitor_stopped: "Stopped", monitor_not_running: "Not running",
    monitor_exited: "Exited",
    question_label: "Ask AI",
    question_placeholder: "Any style divergence in today's ETFs? (Ctrl+Enter to send)",
    btn_ask: "Ask", btn_inspect: "Inspect", btn_refresh: "Refresh",
    btn_start: "Start Monitor", btn_stop: "Stop",
    btn_q1: "Who to Watch", btn_q2: "Compare ETFs",
    btn_recommend: "Recommend",
    snapshot_none: "No snapshot",
    snapshot_label: "Snapshot: {t}",
    col_ticker: "Ticker", col_latest: "Latest", col_prev: "Prev Close",
    col_change: "Change %", col_time: "Time",
    chart_hint: "Click any row in the table to load chart",
    chart_loading: "Loading…",
    chart_done: "Chart loaded", chart_fail: "Chart failed",
    asking: "Calling AI, please wait…",
    ask_done: "Ask complete", ask_fail: "Ask failed",
    inspecting: "Inspecting, please wait…",
    inspect_done: "Inspection complete", inspect_fail: "Inspection failed",
    recommending: "Generating recommendations…",
    recommend_done: "Recommend complete", recommend_fail: "Recommend failed",
    monitor_already: "Monitor is already running",
    start_ok: "Monitor started", stop_ok: "Monitor stopped",
    q1_text: "Which asset deserves the most attention right now?",
    q2_text: "What are the main differences between VUAG and CSP1?",
    statusbar_ready: "Ready",
    lang_btn: "中文",
    ratings_header: "── Signal Rankings ───────────────────────",
    ratings_score: "Score", ratings_daily: "Daily",
  }
};

let lang = "zh";
function t(key, vars = {}) {
  let s = STRINGS[lang][key] || key;
  for (const [k, v] of Object.entries(vars)) s = s.replaceAll(`{${k}}`, v);
  return s;
}
function applyLang() {
  document.querySelectorAll("[data-i18n]").forEach(el => {
    el.textContent = t(el.getAttribute("data-i18n"));
  });
  document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
    el.placeholder = t(el.getAttribute("data-i18n-placeholder"));
  });
  if (!_aiHasContent) {
    document.getElementById("ai-output").textContent = t("ai_initial");
  }
  updateMonitorUI(lastMonitorState);
}

/* ── State ─────────────────────────────────────────────────────────────── */
let _aiHasContent    = false;
let selectedTicker   = null;
let currentPeriod    = "3mo";
let lastMonitorState = { running: false, pid: null, status: "not_started" };
let _busy            = false;

// Alert state: { TICKER: 'critical'|'warning'|'info'|'up' }
let alertsByTicker = {};

/* ── DOM refs ──────────────────────────────────────────────────────────── */
const $ = id => document.getElementById(id);
const aiOutput      = $("ai-output");
const aiDot         = $("ai-dot");
const aiStatus      = $("ai-status");
const tableBody     = $("table-body");
const snapshotMeta  = $("snapshot-meta");
const monitorDot    = $("monitor-dot");
const monitorText   = $("monitor-status-text");
const monitorCtrl   = $("monitor-status-ctrl");
const refreshTime   = $("refresh-time");
const statusMsg     = $("status-msg");
const questionInput = $("question-input");

/* ── TradingView chart ─────────────────────────────────────────────────── */
let _chart       = null;
let _candleSerie = null;
let _volSerie    = null;

function initChart() {
  const container = $("chart-container");
  if (_chart) { _chart.remove(); _chart = null; }

  _chart = LightweightCharts.createChart(container, {
    layout: {
      background: { type: "solid", color: "#161b22" },
      textColor:  "#8b949e",
    },
    grid: {
      vertLines: { color: "#21262d" },
      horzLines: { color: "#21262d" },
    },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor: "#30363d" },
    timeScale: {
      borderColor: "#30363d",
      timeVisible: true,
      secondsVisible: false,
    },
    width:  container.clientWidth,
    height: container.clientHeight,
  });

  _candleSerie = _chart.addCandlestickSeries({
    upColor:        "#3fb950",
    downColor:      "#f85149",
    borderUpColor:  "#3fb950",
    borderDownColor:"#f85149",
    wickUpColor:    "#3fb950",
    wickDownColor:  "#f85149",
  });

  // Resize when panel resizes
  new ResizeObserver(() => {
    if (_chart) {
      _chart.applyOptions({
        width:  container.clientWidth,
        height: container.clientHeight,
      });
    }
  }).observe(container);
}

async function loadInlineChart(ticker, period) {
  if (!ticker) return;
  period = period || currentPeriod;

  $("chart-ticker-label").textContent = `${ticker}  ${period.toUpperCase()}`;
  $("chart-placeholder").style.display = "none";
  $("chart-loading").classList.add("active");
  setStatus(t("chart_loading"));

  try {
    const res  = await fetch(`/api/history/${ticker}?period=${period}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || "error");
    const bars = data.bars || [];
    if (!bars.length) throw new Error("no data");

    if (!_chart) initChart();
    _candleSerie.setData(bars);
    _chart.timeScale().fitContent();
    setStatus(`${t("chart_done")}: ${ticker} ${period}`);
  } catch (e) {
    $("chart-placeholder").style.display = "flex";
    setStatus(`${t("chart_fail")}: ${e.message}`);
  } finally {
    $("chart-loading").classList.remove("active");
  }
}

/* ── Helpers ───────────────────────────────────────────────────────────── */
function setStatus(msg) { statusMsg.textContent = msg; }

function setAi(text, statusKey, dotClass = "done") {
  aiOutput.textContent = text;
  aiStatus.textContent = t(statusKey);
  aiDot.className = `ai-dot ${dotClass}`;
  _aiHasContent = true;
}

function setBusy(busy) {
  _busy = busy;
  ["btn-ask","btn-inspect","btn-refresh","btn-recommend","btn-q1","btn-q2"].forEach(id => {
    const el = $(id);
    if (el) el.disabled = busy;
  });
}

function fmtPrice(v) {
  const n = parseFloat(v);
  return isNaN(n) ? String(v) : n.toFixed(4);
}
function fmtChange(v) {
  const n = parseFloat(v);
  if (isNaN(n)) return String(v);
  return `${n >= 0 ? "+" : ""}${n.toFixed(2)}%`;
}
function changeClass(v) {
  const n = parseFloat(v);
  if (isNaN(n) || Math.abs(n) < 0.05) return "flat";
  return n > 0 ? "up" : "down";
}

function updateMonitorUI(state) {
  lastMonitorState = state;
  const txt = state.running
    ? t("monitor_running", { pid: state.pid })
    : state.status === "not_started" ? t("monitor_not_started")
    : state.status === "stopped"     ? t("monitor_stopped")
    : t("monitor_exited");
  monitorText.textContent = txt;
  monitorCtrl.textContent = txt;
  monitorDot.className = "dot" + (state.running ? " running" : "");
}

/* ── Clock ─────────────────────────────────────────────────────────────── */
function tickClock() {
  $("clock").textContent = new Date().toLocaleString("zh-CN", { hour12: false });
  setTimeout(tickClock, 1000);
}
tickClock();

/* ── Apply row alert highlights ────────────────────────────────────────── */
function applyRowHighlights() {
  tableBody.querySelectorAll("tr[data-ticker]").forEach(tr => {
    const ticker = tr.dataset.ticker;
    const alert  = alertsByTicker[ticker];
    tr.className = [
      selectedTicker === ticker ? "selected" : "",
      alert === "critical" ? "row-critical" :
      alert === "warning"  ? "row-warning"  :
      alert === "info"     ? "row-info"      :
      alert === "up"       ? "row-up"        : "",
    ].filter(Boolean).join(" ");
  });
}

/* ── Data table render ─────────────────────────────────────────────────── */
function renderTable(snapshot) {
  if (!snapshot || !snapshot.data) return;
  const polledAt = snapshot.polled_at || "--";
  snapshotMeta.textContent = t("snapshot_label", { t: polledAt });
  refreshTime.textContent  = polledAt;

  const rows = Object.entries(snapshot.data).map(([ticker, item]) => ({
    ticker,
    latest: item.latest_price,
    prev:   item.previous_close,
    change: item.daily_change_pct,
    ts:     item.timestamp || "--",
    cls:    changeClass(item.daily_change_pct),
  })).sort((a, b) => a.ticker.localeCompare(b.ticker));

  tableBody.innerHTML = rows.map(r => {
    const alert = alertsByTicker[r.ticker];
    const dot   = alert ? `<span class="alert-dot ${alert}"></span>` : "";
    const rowCls = [
      selectedTicker === r.ticker ? "selected" : "",
      alert === "critical" ? "row-critical" :
      alert === "warning"  ? "row-warning"  :
      alert === "info"     ? "row-info"      :
      alert === "up"       ? "row-up"        : "",
    ].filter(Boolean).join(" ");
    return `
    <tr data-ticker="${r.ticker}" class="${rowCls}">
      <td>${r.ticker}${dot}</td>
      <td class="${r.cls}">${fmtPrice(r.latest)}</td>
      <td class="flat">${fmtPrice(r.prev)}</td>
      <td><span class="change-chip ${r.cls}">${fmtChange(r.change)}</span></td>
      <td class="flat" style="font-size:11px">${r.ts}</td>
    </tr>`;
  }).join("");

  tableBody.querySelectorAll("tr").forEach(tr => {
    tr.addEventListener("click", () => {
      const ticker = tr.dataset.ticker;
      selectedTicker = ticker;
      applyRowHighlights();
      loadInlineChart(ticker, currentPeriod);
    });
  });
}

/* ── Fetch & apply alerts ──────────────────────────────────────────────── */
async function fetchAlerts() {
  try {
    const res  = await fetch("/api/alerts");
    if (!res.ok) return;
    const data = await res.json();
    const events = data.events || [];

    // Reset and rebuild alertsByTicker
    alertsByTicker = {};
    const sevOrder = { critical:0, danger:0, strong:0, high:1, warning:2, info:3 };
    for (const ev of events) {
      const ticker = ev.ticker;
      if (!ticker || ticker === "WATCHLIST") continue;
      const sev = (ev.severity || "info").toLowerCase();
      const normalized =
        ["critical","danger","strong"].includes(sev) ? "critical" :
        sev === "high"    ? "warning" :
        sev === "warning" ? "warning" : "info";
      // Keep highest severity
      const existing = alertsByTicker[ticker];
      if (!existing || sevOrder[normalized] < sevOrder[existing]) {
        alertsByTicker[ticker] = normalized;
      }
    }

    // Also mark strong upward movers that have no explicit alert
    // (handled via table data — done in renderTable via changeClass)

    applyRowHighlights();
  } catch {}
}

/* ── WebSocket ─────────────────────────────────────────────────────────── */
function connectWS() {
  const ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onmessage = e => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === "tick") {
        renderTable(msg.snapshot);
        updateMonitorUI(msg.monitor);
      }
    } catch {}
  };
  ws.onclose = () => setTimeout(connectWS, 3000);
}
connectWS();
fetchAlerts();
setInterval(fetchAlerts, 10000);

/* ── AI actions ────────────────────────────────────────────────────────── */
async function askAI() {
  const q = questionInput.value.trim();
  if (!q) return;
  setBusy(true);
  aiDot.className = "ai-dot busy";
  aiStatus.textContent = t("asking");
  aiOutput.textContent = t("asking");
  setStatus(t("asking"));
  try {
    const res  = await fetch("/api/ask", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question: q, lang }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || "error");
    setAi(data.ai_text, "ask_done", "done");
    if (data.snapshot) renderTable(data.snapshot);
    setStatus(t("ask_done"));
  } catch (e) {
    setAi(`${t("ask_fail")}: ${e.message}`, "ask_fail", "error");
    setStatus(t("ask_fail"));
  } finally { setBusy(false); }
}

async function inspectAI() {
  setBusy(true);
  aiDot.className = "ai-dot busy";
  aiStatus.textContent = t("inspecting");
  aiOutput.textContent = t("inspecting");
  setStatus(t("inspecting"));
  try {
    const res  = await fetch("/api/inspect", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ lang }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || "error");
    setAi(data.ai_text, "inspect_done", "done");
    if (data.snapshot) renderTable(data.snapshot);
    if (data.alerts)   { /* alerts already fetched via polling */ }
    setStatus(t("inspect_done"));
  } catch (e) {
    setAi(`${t("inspect_fail")}: ${e.message}`, "inspect_fail", "error");
    setStatus(t("inspect_fail"));
  } finally { setBusy(false); }
}

async function recommendAI() {
  setBusy(true);
  aiDot.className = "ai-dot busy";
  aiStatus.textContent = t("recommending");
  aiOutput.textContent = t("recommending");
  setStatus(t("recommending"));
  try {
    const res  = await fetch("/api/recommend", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ lang }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || "error");

    let out = "";
    if (data.ratings) {
      const sorted = Object.entries(data.ratings).sort((a,b) => b[1].score - a[1].score);
      out += t("ratings_header") + "\n";
      for (const [ticker, r] of sorted) {
        const snap = r.price_snapshot || {};
        const d = snap.daily_change_pct != null
          ? `${snap.daily_change_pct >= 0 ? "+" : ""}${(+snap.daily_change_pct).toFixed(2)}%`
          : "--";
        out += `  ${ticker.padEnd(8)} ${r.signal_label.padEnd(12)} ${t("ratings_score")}: ${String(r.score).padStart(3)}   ${t("ratings_daily")}: ${d}\n`;
      }
      out += "\n";
    }
    out += data.ai_text || "(无回答)";
    setAi(out, "recommend_done", "done");
    if (data.snapshot) renderTable(data.snapshot);
    setStatus(t("recommend_done"));
  } catch (e) {
    setAi(`${t("recommend_fail")}: ${e.message}`, "recommend_fail", "error");
    setStatus(t("recommend_fail"));
  } finally { setBusy(false); }
}

async function startMonitor() {
  try {
    const res  = await fetch("/api/monitor/start", { method: "POST" });
    const data = await res.json();
    updateMonitorUI(data);
    setStatus(data.ok ? t("start_ok") : t("monitor_already"));
  } catch (e) { setStatus(String(e)); }
}

async function stopMonitor() {
  try {
    const res  = await fetch("/api/monitor/stop", { method: "POST" });
    const data = await res.json();
    if (data.ok) updateMonitorUI({ running: false, pid: null, status: "stopped" });
    setStatus(t("stop_ok"));
  } catch (e) { setStatus(String(e)); }
}

async function refreshData() {
  try {
    const [snap] = await Promise.all([
      fetch("/api/snapshot").then(r => r.json()),
    ]);
    renderTable(snap);
    await fetchAlerts();
    setStatus(`Refreshed at ${new Date().toLocaleTimeString()}`);
  } catch (e) { setStatus(String(e)); }
}

/* ── Period buttons ────────────────────────────────────────────────────── */
document.querySelectorAll(".btn-period").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".btn-period").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentPeriod = btn.dataset.period;
    if (selectedTicker) loadInlineChart(selectedTicker, currentPeriod);
  });
});

/* ── Event wiring ──────────────────────────────────────────────────────── */
$("btn-ask").addEventListener("click", askAI);
$("btn-inspect").addEventListener("click", inspectAI);
$("btn-refresh").addEventListener("click", refreshData);
$("btn-start").addEventListener("click", startMonitor);
$("btn-stop").addEventListener("click", stopMonitor);
$("btn-recommend").addEventListener("click", recommendAI);
$("btn-q1").addEventListener("click", () => { questionInput.value = t("q1_text"); askAI(); });
$("btn-q2").addEventListener("click", () => { questionInput.value = t("q2_text"); askAI(); });
questionInput.addEventListener("keydown", e => {
  if (e.key === "Enter" && e.ctrlKey) { e.preventDefault(); askAI(); }
});

// Language toggle
$("lang-btn").addEventListener("click", () => {
  lang = lang === "zh" ? "en" : "zh";
  $("lang-btn").textContent = t("lang_btn");
  applyLang();
});

// Init chart on load
window.addEventListener("load", () => { initChart(); });

applyLang();
</script>
</body>
</html>
